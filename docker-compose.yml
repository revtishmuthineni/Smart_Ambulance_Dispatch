version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=5000
      - MAPMYINDIA_API_KEY=${MAPMYINDIA_API_KEY}
      - MAPMYINDIA_CLIENT_ID=${MAPMYINDIA_CLIENT_ID}
      - MAPMYINDIA_CLIENT_SECRET=${MAPMYINDIA_CLIENT_SECRET}
      - FORCE_MOCK_ROUTE=${FORCE_MOCK_ROUTE}
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
